name: Auto update source index

on:
  push:
    branches: [ main, master ]
    paths:
      - 'source/*.json'          # 仅当源文件变更时触发

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0             # 获取完整历史以便获取 commit 时间

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get changed source files
        id: changed
        run: |
          # 获取本次推送中变更的源文件（新增、修改、删除、重命名）
          git diff --name-only --diff-filter=ACMR ${{ github.event.before }} ${{ github.event.after }} -- 'source/*.json' > changed.txt
          # 将文件列表转为空格分隔的一行，存入环境变量
          CHANGED=$(cat changed.txt | tr '\n' ' ')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Run index update script
        run: node scripts/updateSourceIndex.js --changed-files ${{ steps.changed.outputs.files }}
        # 如果没有任何变更文件（理论上不会发生，但安全处理），脚本会 fallback 到全量重建

      - name: Commit and push if index.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Index.json
          if git diff --staged --quiet; then
            echo "No changes to Index.json"
          else
            git commit -m "chore: auto-update source Index [skip ci]"
            git push
          fi